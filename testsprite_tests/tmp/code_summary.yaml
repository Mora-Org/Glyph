version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js 16 (App Router, static export)
  - ui_library: Tailwind CSS v4
  - other: Fabric.js, Zustand, @dnd-kit/core, @dnd-kit/sortable, gifler, Tauri (desktop wrapper)
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Root page — renders Dashboard if no project exists, otherwise renders the Editor
features:
  - name: Create Project
    description: User creates a new visual essay project from the Dashboard screen
    files:
      - src/app/page.tsx
      - src/components/ui/Dashboard.tsx
      - src/store/projectStore.ts
    entry_route: /
    user_interactions:
      - See the PEG logo and "Novo Projeto" card on the dashboard
      - Type a project name in the input field
      - Click "Criar Projeto" button to create the project
      - Get redirected to the Editor view
    api_calls: []
    auth_required: false
  - name: Canvas Editor
    description: Main editor where users compose visual scenes with images, videos, GIFs and text
    files:
      - src/components/ui/Editor.tsx
      - src/components/canvas/MainCanvas.tsx
      - src/hooks/useFabricCanvas.ts
      - src/store/projectStore.ts
    entry_route: /
    user_interactions:
      - See the editor layout with asset sidebar, canvas area and scene list at the bottom
      - Drag and drop image or video files onto the canvas
      - Select and move/resize elements on the canvas using Fabric.js handles
      - See elements synchronized with the Zustand project store
    api_calls: []
    auth_required: false
  - name: Asset Sidebar
    description: Sidebar for loading local asset folders (images, videos, GIFs) and dragging them to the canvas
    files:
      - src/components/ui/AssetSidebar.tsx
    entry_route: /
    user_interactions:
      - Click "+ Pasta" button to select a local folder
      - See filtered list of image/video/GIF files from the folder
      - Drag an asset from the sidebar onto the canvas
    api_calls: []
    auth_required: false
  - name: Scene Management
    description: Create, reorder and navigate between scenes and active pauses in the timeline
    files:
      - src/components/timeline/SceneList.tsx
      - src/components/timeline/TransitionBadge.tsx
      - src/store/projectStore.ts
    entry_route: /
    user_interactions:
      - See the horizontal scene list at the bottom of the editor
      - Click a scene to make it active (canvas updates)
      - Drag scenes to reorder them
      - Click "+ Cena" to add a new scene
      - Click "+ Pausa" and choose Tela Preta, VHS, or Cor Sólida to add an active pause
      - Click the CUT/FADE badge between scenes to toggle the transition type
    api_calls: []
    auth_required: false
  - name: Active Pauses
    description: Visual pause blocks between scenes (black screen, VHS noise, solid color)
    files:
      - src/components/canvas/ActivePauseCanvas.tsx
      - src/store/projectStore.ts
    entry_route: /
    user_interactions:
      - Add a pause via "+ Pausa" menu in the scene list
      - Click the pause block to preview it in the canvas area
      - See VHS noise animation or black/solid color filling the canvas
    api_calls: []
    auth_required: false
  - name: Element Timeline
    description: Per-element tracks showing visibility window (startTime/endTime) within a scene
    files:
      - src/components/timeline/ElementTimeline.tsx
      - src/store/projectStore.ts
    entry_route: /
    user_interactions:
      - See the timeline panel appear below the canvas when a scene has elements
      - See each element as a colored horizontal track
      - Drag the left handle to adjust startTime
      - Drag the right handle to adjust endTime
    api_calls: []
    auth_required: false
  - name: Lettering Engine
    description: Advanced typography panel for adding and animating text with per-character control
    files:
      - src/components/typography/LetteringPanel.tsx
      - src/hooks/useFabricCanvas.ts
      - src/utils/parsers/lettering.ts
      - src/store/projectStore.ts
    entry_route: /
    user_interactions:
      - Click "✦ Lettering" button in the header to open the lettering panel
      - Click "+ Texto" to add a text element to the canvas
      - Change font family via dropdown
      - Adjust font size via slider
      - Pick text color via color picker
      - Select animation effect (Tremor, Neon, Letreiro, Nenhum)
      - Click "Split em letras individuais" to break text into individual character elements
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Tauri bridge (JS <-> Rust) is only tested with a mock greet command; FFmpeg export is not yet implemented
    location: src-tauri/src/lib.rs
    impact: Export button in the header is non-functional (Phase 5 pending)
  - issue: Active Pauses cannot have their duration edited after creation
    location: src/components/timeline/SceneList.tsx
    impact: Pause duration is fixed at 3s default
  - issue: GIF support via gifler uses a fallback timeout of 500ms for first-frame resolution
    location: src/hooks/useFabricCanvas.ts
    impact: Very large GIFs may not render on the first attempt
